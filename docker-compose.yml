services:
  db:
    image: postgres:16-alpine
    container_name: usercenter-db
    environment:
      POSTGRES_DB: usercenter
      POSTGRES_USER: usercenter
      POSTGRES_PASSWORD: usercenter_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usercenter"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: usercenter-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Database=usercenter;Username=usercenter;Password=usercenter_dev
    ports:
      - "5000:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    container_name: usercenter-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:5000
    depends_on:
      - api

volumes:
  pgdata:
  frontend_node_modules:
